# Google Cloud Build pipeline
# Builds a Docker image and deploys it to Cloud Run.
#
# Required Cloud Secret Manager secrets (set once):
#   DATABASE_URL      - Neon PostgreSQL connection string
#   DIRECT_URL        - Neon direct URL (for migrations)
#   NEXTAUTH_SECRET   - 32+ char random string
#   NEXTAUTH_URL      - https://<your-cloud-run-url>
#   OFFICECONTROL_PASSWORD - Office control panel password
#
# Required substitutions (set in Cloud Build trigger or here):
#   _REGION           - e.g. asia-south1
#   _SERVICE_NAME     - e.g. cargo-erp
#   _REPO             - e.g. asia-south1-docker.pkg.dev/$PROJECT_ID/cargo-erp/web

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: cargo-erp
  _REPO: asia-south1-docker.pkg.dev/$PROJECT_ID/cargo-erp/web

steps:
  # ── Step 1: Build the Docker image ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args:
      - build
      - '--no-cache'
      - '--tag'
      - '$_REPO:$SHORT_SHA'
      - '--tag'
      - '$_REPO:latest'
      - '--file'
      - 'Dockerfile'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # ── Step 2: Push the image to Artifact Registry ──────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - push
      - '--all-tags'
      - '$_REPO'
    waitFor: ['Build']

  # ── Step 3: Deploy to Cloud Run ──────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE_NAME'
      - '--image=$_REPO:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=60'
      # Inject secrets as environment variables from Secret Manager
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,DIRECT_URL=DIRECT_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,NEXTAUTH_URL=NEXTAUTH_URL:latest,OFFICECONTROL_PASSWORD=OFFICECONTROL_PASSWORD:latest'
      - '--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'
    waitFor: ['Push']

# Store built images in Artifact Registry
images:
  - '$_REPO:$SHORT_SHA'
  - '$_REPO:latest'

# Build timeout (large app with Handsontable takes time)
timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
